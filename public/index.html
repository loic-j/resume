<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>Loic [LastName] — Senior Backend Developer & Engineering Manager</title>
  <meta name="description" content="Senior Backend Developer with 18+ years of experience. Engineering Manager. Distributed systems, architecture, team leadership.">
  <link rel="canonical" href="https://[your-domain.com]">

  <!-- Open Graph -->
  <meta property="og:type" content="profile">
  <meta property="og:title" content="Loic [LastName] — Senior Backend Developer">
  <meta property="og:description" content="18+ years of backend development. 2 years engineering management.">
  <meta property="og:url" content="https://[your-domain.com]">
  <meta property="og:image" content="https://[your-domain.com]/photo.jpg">

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Loic [LastName]",
    "jobTitle": "Senior Backend Developer & Engineering Manager",
    "description": "Senior Backend Developer with 18+ years of experience",
    "url": "https://[your-domain.com]",
    "sameAs": [
      "https://linkedin.com/in/[profile]",
      "https://github.com/[username]"
    ]
  }
  </script>

  <!-- Fonts: Playfair Display (display) + JetBrains Mono (tech) + Outfit (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ─── VARIABLES & THEMES ──────────────────────────── */
    :root {
      --bg:         #0C0E13;
      --surface:    #141720;
      --surface-2:  #1C2030;
      --border:     #252A3A;
      --text:       #E8EAF0;
      --text-muted: #8892A4;
      --accent:     #5B8DEF;
      --accent-bg:  rgba(91,141,239,.12);
      --accent-2:   #2DD4BF;
      --sidebar-w:  270px;
      --ff-display: 'Playfair Display', Georgia, serif;
      --ff-body:    'Outfit', sans-serif;
      --ff-mono:    'JetBrains Mono', monospace;
      --radius:     12px;
      --transition: .25s ease;
    }
    [data-theme="light"] {
      --bg:         #F2F4FB;
      --surface:    #FFFFFF;
      --surface-2:  #E8EBF5;
      --border:     #D4D9EE;
      --text:       #1A1F2E;
      --text-muted: #5A6480;
      --accent:     #2D5FD4;
      --accent-bg:  rgba(45,95,212,.08);
      --accent-2:   #0D9B8A;
    }

    /* ─── RESET & BASE ────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: var(--ff-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      line-height: 1.65;
      transition: background var(--transition), color var(--transition);
    }
    a { color: var(--accent); text-decoration: none; transition: opacity .2s; }
    a:hover { opacity: .75; }

    /* ─── SCROLLBAR ───────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ─── SIDEBAR ─────────────────────────────────────── */
    .sidebar {
      position: fixed; top: 0; left: 0;
      width: var(--sidebar-w); height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 2.25rem 1.75rem;
      overflow-y: auto; z-index: 100;
      transition: background var(--transition), border-color var(--transition);
    }

    /* ─── PROFILE ─────────────────────────────────────── */
    .profile {
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      margin-bottom: 1.75rem;
    }
    .avatar {
      width: 100px; height: 100px;
      border-radius: 50%;
      border: 2.5px solid var(--accent);
      overflow: hidden;
      margin-bottom: .9rem;
      background: var(--surface-2);
      flex-shrink: 0;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .avatar-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--ff-display);
      font-size: 2.25rem; color: var(--text-muted);
    }
    .profile-name {
      font-family: var(--ff-display);
      font-size: 1.2rem; font-weight: 700;
      color: var(--text); letter-spacing: -.02em; line-height: 1.2;
    }
    .profile-title-text {
      font-family: var(--ff-mono);
      font-size: .68rem; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .08em;
      margin-top: .35rem; line-height: 1.4;
    }

    /* ─── CONTROLS ────────────────────────────────────── */
    .controls {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem; gap: .5rem;
    }
    .lang-switcher {
      display: flex;
      background: var(--surface-2);
      border-radius: 8px; padding: 3px; gap: 2px;
    }
    .lang-btn {
      padding: .22rem .5rem;
      border: none; background: transparent;
      color: var(--text-muted);
      font-family: var(--ff-mono);
      font-size: .68rem; font-weight: 500;
      border-radius: 6px; cursor: pointer;
      transition: all .2s;
      text-transform: uppercase; letter-spacing: .05em;
    }
    .lang-btn.active { background: var(--accent); color: #fff; }
    .lang-btn:hover:not(.active) { color: var(--text); background: var(--border); }

    .theme-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; flex-shrink: 0;
    }
    .theme-btn:hover { color: var(--text); border-color: var(--accent); }
    .theme-btn svg { width: 15px; height: 15px; }

    /* ─── NAV ─────────────────────────────────────────── */
    .sidebar-nav {
      display: flex; flex-direction: column;
      gap: .2rem; margin-bottom: auto;
    }
    .nav-btn {
      display: flex; align-items: center;
      gap: .7rem; padding: .5rem .7rem;
      border-radius: 8px;
      color: var(--text-muted);
      font-size: .83rem; font-weight: 500;
      cursor: pointer; border: none;
      background: transparent; text-align: left;
      width: 100%; transition: all .2s;
    }
    .nav-btn:hover, .nav-btn.active {
      background: var(--accent-bg);
      color: var(--accent);
    }
    .nav-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0; opacity: .5;
      transition: opacity .2s;
    }
    .nav-btn.active .nav-dot { opacity: 1; }

    /* ─── CONTACT LINKS ───────────────────────────────── */
    .contact-links {
      margin-top: 1.75rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: .55rem;
    }
    .contact-link {
      display: flex; align-items: center; gap: .55rem;
      color: var(--text-muted);
      font-size: .73rem; font-family: var(--ff-mono);
      transition: color .2s; word-break: break-all;
    }
    .contact-link:hover { color: var(--accent); opacity: 1; }
    .contact-link svg {
      width: 13px; height: 13px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round;
      stroke-linejoin: round; flex-shrink: 0;
    }

    /* ─── MAIN ────────────────────────────────────────── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 3rem 3.5rem 5rem;
      max-width: calc(var(--sidebar-w) + 780px);
    }

    /* ─── SECTION ─────────────────────────────────────── */
    .section { margin-bottom: 4.5rem; scroll-margin-top: 2rem; }

    .section-header {
      display: flex; align-items: center;
      gap: 1rem; margin-bottom: 2rem;
    }
    .section-num {
      font-family: var(--ff-mono);
      font-size: .62rem; text-transform: uppercase;
      letter-spacing: .18em; color: var(--accent);
      white-space: nowrap;
    }
    .section-title {
      font-family: var(--ff-display);
      font-size: 1.7rem; font-weight: 600;
      color: var(--text); letter-spacing: -.02em;
      white-space: nowrap;
    }
    .section-line {
      flex: 1; height: 1px; background: var(--border);
    }

    /* ─── ABOUT ───────────────────────────────────────── */
    .about-text {
      color: var(--text-muted);
      font-size: .975rem; line-height: 1.85;
      margin-bottom: 1.75rem; max-width: 640px;
    }
    .stat-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .stat-card {
      flex: 1; min-width: 150px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }
    .stat-num {
      font-family: var(--ff-display);
      font-size: 2.2rem; font-weight: 700;
      color: var(--accent); line-height: 1;
    }
    .stat-lbl {
      font-family: var(--ff-mono);
      font-size: .7rem; color: var(--text-muted);
      margin-top: .3rem; text-transform: uppercase;
      letter-spacing: .05em;
    }

    /* ─── TIMELINE ────────────────────────────────────── */
    .timeline { position: relative; padding-left: 2rem; }
    .timeline::before {
      content: '';
      position: absolute; left: 0; top: 10px; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, var(--accent) 0%, transparent 90%);
    }
    .tl-item { position: relative; margin-bottom: 2.5rem; }
    .tl-item::before {
      content: '';
      position: absolute;
      left: -2.4rem; top: 8px;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px var(--bg), 0 0 0 4px var(--accent);
    }
    .tl-role { font-weight: 600; font-size: 1rem; color: var(--text); }
    .tl-company { color: var(--accent); font-size: .88rem; font-weight: 500; margin-top: .12rem; }
    .tl-meta {
      display: flex; gap: 1rem; flex-wrap: wrap;
      margin-top: .35rem; margin-bottom: .75rem;
    }
    .tl-date, .tl-loc {
      font-family: var(--ff-mono);
      font-size: .67rem; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .06em;
    }
    .tl-desc { color: var(--text-muted); font-size: .875rem; line-height: 1.75; }
    .tags { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .65rem; }
    .tag {
      font-family: var(--ff-mono);
      font-size: .62rem; padding: .18rem .55rem;
      border-radius: 4px;
      background: var(--surface-2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      text-transform: uppercase; letter-spacing: .05em;
    }

    /* ─── SKILLS ──────────────────────────────────────── */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }
    .skill-cat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.15rem 1.25rem;
    }
    .skill-cat-name {
      font-family: var(--ff-mono);
      font-size: .63rem; text-transform: uppercase;
      letter-spacing: .12em; color: var(--accent-2);
      margin-bottom: .75rem;
    }
    .skill-chips { display: flex; flex-wrap: wrap; gap: .35rem; }
    .chip {
      font-size: .78rem; padding: .25rem .6rem;
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* ─── MANAGEMENT ──────────────────────────────────── */
    .mgmt-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .mgmt-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.5rem;
      transition: border-color var(--transition);
    }
    .mgmt-card:hover { border-color: var(--accent); }
    .mgmt-icon { font-size: 1.4rem; margin-bottom: .65rem; }
    .mgmt-title { font-weight: 600; font-size: .95rem; color: var(--text); margin-bottom: .4rem; }
    .mgmt-desc { font-size: .85rem; color: var(--text-muted); line-height: 1.65; }

    /* ─── PROJECTS ────────────────────────────────────── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }
    .proj-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: border-color var(--transition), transform var(--transition);
    }
    .proj-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .proj-name {
      font-weight: 600; font-size: .98rem;
      color: var(--text); display: flex;
      align-items: center; gap: .4rem;
      margin-bottom: .5rem;
    }
    .proj-ext { font-size: .75rem; color: var(--text-muted); }
    .proj-desc { font-size: .84rem; color: var(--text-muted); line-height: 1.65; margin-bottom: .85rem; }

    /* ─── EDUCATION ───────────────────────────────────── */
    .edu-list { display: flex; flex-direction: column; gap: .85rem; }
    .edu-item {
      display: flex; gap: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.15rem 1.5rem;
      align-items: flex-start;
    }
    .edu-year {
      font-family: var(--ff-mono);
      font-size: .67rem; color: var(--accent);
      text-transform: uppercase; letter-spacing: .08em;
      white-space: nowrap; margin-top: .15rem; min-width: 60px;
    }
    .edu-degree { font-weight: 600; font-size: .93rem; color: var(--text); }
    .edu-school { font-size: .83rem; color: var(--text-muted); margin-top: .2rem; }

    /* ─── ANIMATIONS ──────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .section {
      opacity: 0;
      animation: fadeUp .5s ease forwards;
    }
    .section:nth-child(1) { animation-delay: .05s; }
    .section:nth-child(2) { animation-delay: .12s; }
    .section:nth-child(3) { animation-delay: .19s; }
    .section:nth-child(4) { animation-delay: .26s; }
    .section:nth-child(5) { animation-delay: .33s; }
    .section:nth-child(6) { animation-delay: .4s; }

    /* ─── PRINT ───────────────────────────────────────── */
    @media print {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 1.5cm; max-width: 100%; }
      .section { page-break-inside: avoid; margin-bottom: 2rem; }
      body { background: white; color: black; font-size: 11pt; }
      * { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .stat-card, .skill-cat, .mgmt-card, .proj-card, .edu-item {
        border: 1px solid #ccc !important;
        background: white !important;
      }
    }

    /* ─── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 900px) {
      .main { padding: 2rem 2rem 5rem; }
    }
    @media (max-width: 720px) {
      :root { --sidebar-w: 0px; }
      .sidebar {
        position: fixed; bottom: 0; top: auto; left: 0;
        width: 100%; height: auto;
        flex-direction: row; align-items: center;
        justify-content: space-between;
        padding: .75rem 1.25rem;
        border-right: none; border-top: 1px solid var(--border);
        overflow: visible;
      }
      .profile, .sidebar-nav, .contact-links { display: none; }
      .controls { margin: 0; }
      .main { margin-left: 0; padding: 1.5rem 1.25rem 5rem; }
      .section-title { font-size: 1.4rem; }
      .skills-grid, .mgmt-grid, .projects-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════ SIDEBAR ═══════════════════ -->
<aside class="sidebar">

  <div class="profile">
    <div class="avatar">
      <!-- ▸ Replace with: <img src="photo.jpg" alt="Loic [LastName]"> -->
      <div class="avatar-placeholder">L</div>
    </div>
    <div class="profile-name">Loic [LastName]</div>

    </button>
    <button class="nav-btn" onclick="scrollTo('skills')">
      <span class="nav-dot"></span>
      <span data-i18n="nav_skills">Skills</span>

      <span class="nav-dot"></span>
      <span data-i18n="nav_projects">Projects</span>

      <span class="nav-dot"></span>
      <span data-i18n="nav_education">Education</span>

      [your@email.com]
    </a>
    <a class="contact-link" href="https://github.com/[username]" target="_blank" rel="noopener">

      github/[username]

    <a class="contact-link" href="https://linkedin.com/in/[profile]" target="_blank" rel="noopener">

</aside>

<main class="main">

  <!-- ABOUT -->
  <section class="section" id="about">
    <div class="section-header">
      <span class="section-num">01</span>
      <h2 class="section-title" data-i18n="section_about">About</h2>
      <div class="section-line"></div>

        <div class="stat-num">2</div>
        <div class="stat-lbl" data-i18n="stat_mgmt">Years in management</div>

  <!-- EXPERIENCE -->
  <section class="section" id="experience">
    <div class="section-header">
      <span class="section-num">02</span>
      <h2 class="section-title" data-i18n="section_experience">Experience</h2>
      <div class="section-line"></div>
    </div>

  </section>

  <!-- SKILLS -->
  <section class="section" id="skills">
    <div class="section-header">
      <span class="section-num">03</span>
      <h2 class="section-title" data-i18n="section_skills">Skills</h2>
      <div class="section-line"></div>
    </div>
    <div class="skills-grid" id="skills-grid"></div>
  </section>

  <!-- MANAGEMENT -->
  <section class="section" id="management">
    <div class="section-header">
      <span class="section-num">04</span>
      <h2 class="section-title" data-i18n="section_management">Management</h2>
      <div class="section-line"></div>
    </div>
    <div class="mgmt-grid" id="mgmt-grid"></div>
  </section>

  <!-- PROJECTS -->
  <section class="section" id="projects">

let lang = 'en';

function setLang(l) {
  lang = l;
  const d = i18n[l];
  document.documentElement.lang = l === 'ja' ? 'ja' : l === 'fr' ? 'fr' : 'en';

  // Static text nodes
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (d[k] !== undefined) el.textContent = d[k];
  });

  // Active lang button
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase() === l);
  });

  // Dynamic sections
  renderTimeline(d.experience);
  renderSkills(d.skills);
  renderMgmt(d.management);
  renderProjects(d.projects);
  renderEdu(d.education);
}

function renderTimeline(data) {
  document.getElementById('timeline').innerHTML = data.map(x => `
    <div class="tl-item">
      <div class="tl-role">${x.role}</div>
      <div class="tl-company">${x.company}</div>
      <div class="tl-meta">
        <span class="tl-date">${x.date}</span>
        <span class="tl-loc">📍 ${x.loc}</span>
      </div>
      <p class="tl-desc">${x.desc}</p>
      <div class="tags">${x.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>`).join('');
}

function renderSkills(data) {
  document.getElementById('skills-grid').innerHTML = data.map(c => `
    <div class="skill-cat">

}

function renderMgmt(data) {

const MOON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
const SUN  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;

function toggleTheme() {
  const html  = document.documentElement;
  const next  = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('theme-btn').innerHTML = next === 'dark' ? MOON : SUN;
  localStorage.setItem('cv-theme', next);
}

function initTheme() {
  const saved     = localStorage.getItem('cv-theme');
  const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  const theme     = saved || preferred;
  document.documentElement.dataset.theme = theme;
  document.getElementById('theme-btn').innerHTML = theme === 'dark' ? MOON : SUN;
}

/* ═══════════════════════════════════════════════════
   ACTIVE NAV ON SCROLL
═══════════════════════════════════════════════════ */
const SECTIONS = ['about','experience','skills','management','projects','education'];

function scrollTo(id) {
  document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
}

function updateNav() {
  let active = SECTIONS[0];
  SECTIONS.forEach(id => {
    const el = document.getElementById(id);
    if (el && el.getBoundingClientRect().top < window.innerHeight * 0.45) active = id;
  });
  document.querySelectorAll('.nav-btn').forEach((btn, i) => {
    btn.classList.toggle('active', SECTIONS[i] === active);
  });
}

window.addEventListener('scroll', updateNav, { passive: true });

/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */
